version: '3.8'

services:
  backend:
    build:
      context: ./backend-nest
      dockerfile: Dockerfile
    container_name: subkeeper_backend
    ports:
      - "${BACKEND_PORT:-3001}:${PORT:-3001}"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://subscription:changeme@subkeeper_db:5432/subscription_manager}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key}
      - PORT=${PORT:-3001}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
    container_name: subkeeper_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://subkeeper_backend:3001}
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: subkeeper_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-subscription}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-subscription_manager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-subscription}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: